      principal comparison uses about 2.048M tokens per batch.
    compute_budget: >-
      The 360M and 660M schedules use 3200 and 6400 optimizer steps; wall time is estimated from
      single-H100 throughput with gradient accumulation rather than a distributed end-to-end run.
    baseline_tuning: >-
      Learning-rate sweeps are followed by two-dimensional optimizer-specific sweeps; baselines are
      PyTorch AdamW and Distributed Shampoo.
    evaluation_metric: >-
