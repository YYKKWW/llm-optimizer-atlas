- id: pion-spectrum-preserving-optimizer
  title: 'Pion: A Spectrum-Preserving Optimizer via Orthogonal Equivalence Transformation'
  authors:
    - Kexuan Shi
    - Hanxuan Li
    - Zeju Qiu
    - Yandong Wen
    - Simon Buchholz
    - Weiyang Liu
  year: 2026
  publication_date: 2026-05-12
  status: preprint
  venue: ''
  paper_url: https://arxiv.org/abs/2605.12492
  code_url: https://github.com/Sphere-AI-Lab/pion
  source_version: arXiv:2605.12492v1
  tags:
    - iso-spectral-manifold
    - lie-algebra
    - matrix-exponential
    - spectrum-preservation
  research_tracks:
    - manifold-constraints
    - systems
  frontier_watch: true
  core_claim: >-
    The paper claims that updating weight matrices through coupled left and right orthogonal
    transformations preserves their singular spectrum and provides a stable, competitive alternative
    to additive optimizers in its pretraining and finetuning experiments.
  exact_update: >-
    For gradient $G_t$,

    $G_t^{\mathrm{in}}=W_t^\top G_t-(W_t^\top G_t)^\top$ and

    $G_t^{\mathrm{out}}=G_tW_t^\top-(G_tW_t^\top)^\top$.

    The core update is

    $W_{t+1}=\exp(-\eta G_t^{\mathrm{out}})W_t\exp(-\eta G_t^{\mathrm{in}})$.

    The practical algorithm applies first- and second-moment estimates in the two Lie algebras and
    replaces each exponential with

    $\mathcal E_2(A,\alpha)=I+\eta\alpha A+(\eta\alpha A)^2/2$.
  traditional_optimization_link:
    - optimization on iso-spectral manifolds
    - Lie-group and Lie-algebra methods
    - orthogonal equivalence transformations
    - matrix exponential and Cayley transforms
    - Riemannian optimization
  evidence:
    model_scales: >-
      LLaMA-based pretraining up to 1.3B parameters, plus 200-layer and normalization-free models;
      separate SFT and RLVR studies use small billion-scale models.
    datasets: C4 for pretraining; MetaMathQA and Magicoder-Evol-Instruct for SFT; DeepMath for RLVR.
    token_budget: >-
      54B C4 tokens for the 1.3B pretraining experiment, 9.6B tokens for normalization-free
      training, and 50B tokens for the 200-layer study.
    compute_budget: >-
      Per-step runtime and peak memory are measured on eight NVIDIA H100 GPUs with NVLink using DDP
      and no gradient accumulation; aggregate training FLOPs and accelerator-hours are not reported.
    baseline_tuning: >-
      The paper compares Pion with AdamW and Muon across pretraining, SFT, and RLVR protocols;
      complete matched tuning cost is not captured in this record.
    evaluation_metric: >-
      Validation loss, downstream accuracy, stability diagnostics, SFT in-domain and out-of-domain
      accuracy, and RLVR avg-at-k accuracy.
    wall_clock_reported: true
    optimizer_state_reported: true
  limitations:
    - >-
      Exact matrix exponentials preserve the singular spectrum, while the practical second-order
      truncation preserves it only approximately.
    - >-
      Evidence spans several distinct protocols and does not establish universal superiority over
      AdamW or Muon.
    - >-
      In the reported eight-H100 per-step comparison, full Pion is slower and uses more peak memory
      than both AdamW and Muon; this is not an end-to-end training-cost comparison.
    - >-
      The official repository provides core implementations but does not yet present a tagged
      release.
  reading_status: unread
  last_verified: 2026-07-16
  human_notes: ''
