  paper_url: https://openreview.net/forum?id=pQQuC1nIQq
  code_url: https://github.com/yorkerlin/KL-Methods
  source_version: ICLR 2026 proceedings version; extended arXiv:2509.03378v10
  tags:
    - covariance-estimation
    - kl-divergence
    - kl-shampoo
    - kronecker-preconditioning
  research_tracks:
    - preconditioning
    - systems
  frontier_watch: false
  core_claim: >-
    In the paper's bfloat16 language-model experiments with equal iteration counts and per-method
    random-search tuning, joint KL-based covariance estimation yields KL-Shampoo, which avoids Adam
    grafting and attains lower test loss than the evaluated Shampoo, SOAP, and KL-SOAP
    implementations while retaining similar per-iteration runtime to SOAP.
  exact_update: |-
    For $G=\operatorname{Mat}(g)$ and EMA weight $\rho$,
    $\Delta_a=(1/d_b)GQ_b\operatorname{Diag}(\lambda_b^{-1})Q_b^\top G^\top$ and
    $\Delta_b=(1/d_a)G^\top Q_a\operatorname{Diag}(\lambda_a^{-1})Q_a^\top G$.
    $S_k\leftarrow(1-\rho)S_k+\rho\Delta_k$ and
    $\lambda_k\leftarrow(1-\rho)\lambda_k+\rho\,\operatorname{diag}(Q_k^\top\Delta_kQ_k)$;
    every $f$ steps $Q_k\leftarrow\operatorname{qr}(S_kQ_k)$.
    With $Q=Q_a\otimes Q_b$,
    $\theta\leftarrow\theta-\gamma[Q\operatorname{Diag}(\lambda_a\otimes\lambda_b)^{-1/2}Q^\top]g$.
  traditional_optimization_link:
    - log-determinant Bregman divergence
    - Gaussian covariance maximum likelihood
    - matrix-normal whitening
    - SPD manifold optimization
    - natural gradient
    - Kronecker-factored preconditioning
  evidence:
    model_scales: >-
      NanoGPT 123M, NanoRWKV7 162M, Llama 134M, and NanoMoE 227M in the main experiments; arXiv v10
      also reports a 450M Llama3 experiment.
    datasets: FineWeb for NanoGPT and NanoRWKV7, C4 for Llama, and OpenWebText for NanoMoE.
    token_budget: >-
      1B tokens for NanoGPT and NanoRWKV7, 2B for Llama, and 2.5B for NanoMoE; batches are 0.5M
      tokens except NanoMoE at 0.25M.
    compute_budget: >-
      Main comparisons use 150 random-search runs per method, equal iteration counts, and QR or
      eigendecomposition every 10 iterations; total FLOPs and hardware model are not stated.
    baseline_tuning: >-
      All available optimizer hyperparameters are tuned with a two-stage random search; comparisons
      include Shampoo, SOAP, KL-SOAP, and implementation-aligned variants.
    evaluation_metric: >-
      Language-model test loss at equal iterations, per-iteration runtime, and selected wall-clock
      comparisons in the extended appendix.
    wall_clock_reported: true
    optimizer_state_reported: true
  limitations:
