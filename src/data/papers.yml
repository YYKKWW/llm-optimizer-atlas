    - minimax-polynomials
    - muon
    - polar-decomposition
  research_tracks:
    - norm-duality
    - systems
  frontier_watch: false
  core_claim: >-
    Given a singular-value interval, polynomial degree, and iteration budget, the paper claims that
    its greedy minimax construction is globally worst-case optimal for the composed matrix-sign
    approximation and can improve Muon's practical polar-factor computation.
  exact_update: >-
    Muon uses $M_t=\beta M_{t-1}+(1-\beta)G_t$ and

    $W_{t+1}=W_t-\lambda\,\operatorname{polar}(M_t)$, where $\operatorname{polar}(M)=UV^\top$ for
    $M=U\Sigma V^\top$.

    Polar Express initializes $X_0=M/(\|M\|_F+10^{-2})$ and applies scheduled odd minimax
    polynomials $X_t=p_t(X_{t-1})$.

    For $p_t(x)=a_tx+b_tx^3+c_tx^5$, the matrix step is

    $Y=X^\top X$ and $X\leftarrow X(aI+Y(bI+cY))$.
  traditional_optimization_link:
    - polar decomposition and matrix sign
    - minimax polynomial approximation
    - Chebyshev equioscillation and Remez methods
    - Newton-Schulz and Pade iterations
    - spectral-norm steepest descent
  evidence:
    model_scales: GPT-2 Small with 124M parameters and GPT-2 Large with 774M parameters.
    datasets: FineWeb.
    token_budget: 1B tokens in the main experiments and a 10B-token extension.
    compute_budget: >-
      Four NVIDIA H100 GPUs, bfloat16, and five degree-5 matrix-sign iterations; FLOPs are not
      reported.
    baseline_tuning: >-
      Jordan and You matrix-sign approximations are used inside otherwise matched Muon runs with a
      learning-rate sweep; AdamW handles excluded parameters.
    evaluation_metric: Training and validation loss plus median step time.
    wall_clock_reported: true
    optimizer_state_reported: false
  limitations:
    - >-
      The exact minimax guarantee assumes a valid singular-value interval, while the practical
      bfloat16 method estimates the interval and adds numerical safety modifications.
    - >-
      The experiments are limited to GPT-2-scale models and do not establish convergence of the full
