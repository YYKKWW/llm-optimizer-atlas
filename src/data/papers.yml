- id: demystifying-manifold-constraints-llm-pretraining
  title: Demystifying Manifold Constraints in LLM Pre-training
  authors:
    - Kang An
    - Jiaxiang Li
    - Donald Goldfarb
    - Shiqian Ma
  year: 2026
  publication_date: 2026-05-06
  status: preprint
  venue: ''
  paper_url: https://arxiv.org/abs/2605.04418
  code_url: TODO_UNVERIFIED
  source_version: arXiv:2605.04418v1
  tags:
    - macro-optimizer
    - manifold-constraints
    - matrix-sign
    - riemannian-optimization
  research_tracks:
    - norm-duality
    - manifold-constraints
    - benchmarking
  frontier_watch: true
  core_claim: >-
    The paper claims that explicit Frobenius, spectral, or oblique constraints can control
    activation scale and rotational dynamics directly, and that its single-loop MACRO update can
    preserve these constraints without relying on decoupled weight decay.
  exact_update: >-
    Let $G_t=\nabla L(W_t)$ and update the momentum before projecting it:


    $M_t=\beta M_{t-1}+(1-\beta)G_t$,


    $\Phi_t=\operatorname{proj}_{T_{\mathcal M}(W_t)}(M_t)$, and $O_t=\operatorname{msign}(\Phi_t)$.


    The normalized manifold update is


    $\widetilde g_t=cR\,O_t/(\|O_t\|_{\mathcal M}+\epsilon)$ and


    $W_{t+1}=P_{\mathcal M}(W_t-\eta_t\widetilde g_t)$,


    where $P_{\mathcal M}$ is a projectional retraction. For a Frobenius sphere,

    $P_{\mathcal M}(\widetilde W)=R\widetilde W/\|\widetilde W\|_F$; the experimental
    spectral-sphere approximation uses $R\widetilde W/\|\widetilde W\|_2$.
  traditional_optimization_link:
    - Riemannian gradient methods
    - tangent-space projection
    - projectional retraction
    - norm-constrained linear minimization
    - rotational equilibrium
    - decoupled weight decay
  evidence:
    model_scales: >-
      Qwen3-like models with 120M, 330M, and 1B parameters; an additional 330M normalization-free
      experiment.
    datasets: OpenWebText.
    token_budget: 3.7B, 8.9B, and 50B tokens for the 120M, 330M, and 1B models.
    compute_budget: >-
      Eight GPUs are reported for the three scales; aggregate FLOPs and hardware model are not
      reported.
    baseline_tuning: >-
      Muon, MACRO variants, and manifold baselines are learning-rate swept; constrained methods also
      sweep radii and selected matrix-splitting choices.
    evaluation_metric: >-
      Training and validation loss, tangent-space violation, activation stability, weight-decay
      ablations, and learning-rate transfer.
    wall_clock_reported: false
    optimizer_state_reported: false
  limitations:
    - >-
      The paper states that the spectral sphere is not a manifold, so its compact smooth-manifold
      convergence theorem does not cover that constraint.
    - >-
      The spectral $\Theta(1)$ activation-control result assumes $\Theta(1)$ input RMS, full-rank
      weights, and $\sigma_{\min}(W)=\Omega(1)$; without the lower-singular-value condition, the
      spectral constraint gives only an $O(1)$ upper bound.
    - The paper explicitly omits wall-clock comparisons.
    - >-
      The normalization-free experiment also changes activation and parameter-free normalization
      choices, so it does not isolate the optimizer alone.
  reading_status: unread
