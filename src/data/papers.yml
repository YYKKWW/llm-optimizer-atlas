  frontier_watch: false
  core_claim: >-
    Under the paper's stated simplifications, Adam, Shampoo, and Prodigy reduce to steepest-descent
    variants under different norms, making norm choice and step-size choice explicit
    optimizer-design axes.
  exact_update: >-
    For a norm $\|\cdot\|$, its dual $\|\cdot\|_*$, and $\lambda>0$,


    $\Delta
    w^*=\arg\min_\Delta\{g^\top\Delta+(\lambda/2)\|\Delta\|^2\}=-(\|g\|_*/\lambda)\arg\max_{\|t\|=1}g^\top
    t$.


    With the paper's simplifications, Adam gives $w_{t+1}=w_t-\eta\,\operatorname{sign}(g_t)$;
    Shampoo with $G=U\Sigma V^\top$ gives $W_{t+1}=W_t-\eta UV^\top$; and Prodigy uses
    $w_{t+1}=w_t-\eta_t\operatorname{sign}(g_t)$ with
    $\eta_{t+1}=\max(\eta_t,g_t^\top(w_0-w_t)/\|g_t\|_1)$.
  traditional_optimization_link:
    - steepest descent in normed spaces
    - primal and dual norm geometry
    - polar decomposition and spectral descent
    - majorization-minimization
    - online line search
