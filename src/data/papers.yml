    - optimizer-geometry
  research_tracks:
    - norm-duality
  frontier_watch: false
  core_claim: >-
    The paper claims that assigning operator norms from a layer's semantic role and recursively
    composing their duality maps yields an architecture-wide modular dualization rule for
    steepest-descent updates.
  exact_update: |-
    $\operatorname{dualize}_{\|\cdot\|}(g)=\arg\max_{\|t\|=1}g^\top t$ and
    $\Delta w^*=-(\|g\|_*/\lambda)\operatorname{dualize}(g)$.
    For a linear layer with $G=U\Sigma V^\top$, the atomic map is
    $\sqrt{d_{\mathrm{out}}/d_{\mathrm{in}}}\,UV^\top$.
    Embedding columns are normalized by their RMS; each $k\times k$ convolution slice maps to
    $(1/k^2)\sqrt{d_{\mathrm{out}}/d_{\mathrm{in}}}\,U_{ij}V_{ij}^\top$.
    Compound-module maps are then composed recursively using module mass and downstream sensitivity.
  traditional_optimization_link:
    - normed-space steepest descent
    - induced operator norms
    - duality maps
    - polar decomposition
    - modular and Finsler geometry
  evidence:
    model_scales: Three-layer bias-free MLPs with widths 32-4096; width 1024 for the weight-erasure experiment.
    datasets: CIFAR-10 without data augmentation.
    token_budget: >-
      Learning-rate transfer uses 20 epochs with batch 128; weight erasure uses 1000 steps with
      batch 1024.
    compute_budget: Hardware and FLOP budgets are not reported.
    baseline_tuning: >-
      Adam under standard and muP-style parameterizations is learning-rate swept; the modular update
      dualizes the raw gradient with five Newton-Schulz steps.
    evaluation_metric: >-
      Final training loss and recovery of an initialization watermark in the weight-erasure
      experiment.
    wall_clock_reported: false
    optimizer_state_reported: false
  limitations:
    - >-
      The paper-internal experiments are CIFAR-10 MLPs rather than Transformer language-model
      pretraining.
