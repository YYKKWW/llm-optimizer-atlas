  frontier_watch: false
  core_claim: >-
    In the paper's tuned C4 language-model experiments, applying Adam in a slowly refreshed Shampoo
    eigenbasis preserves per-step adaptivity and reaches matched final test loss in fewer iterations
    and lower estimated single-H100 time than the tuned AdamW and Distributed Shampoo baselines.
  exact_update: >-
    $G'_t=Q_{L,t}^\top G_tQ_{R,t}$ and

    $M_t=\beta_1M_{t-1}+(1-\beta_1)G_t$, with $M'_t=Q_{L,t}^\top M_tQ_{R,t}$.

    $V_t=\beta_2V_{t-1}+(1-\beta_2)(G'_t\odot G'_t)$,

    $N'_t=M'_t/(\sqrt{V_t}+\epsilon)$,

    $N_t=Q_{L,t}N'_tQ_{R,t}^\top$, and $W_{t+1}=W_t-\eta_tN_t$.

    The Shampoo statistics are

    $L_t=\beta_2L_{t-1}+(1-\beta_2)G_tG_t^\top$ and

    $R_t=\beta_2R_{t-1}+(1-\beta_2)G_t^\top G_t$;

    every $f$ steps, $Q_L\leftarrow\operatorname{qr}(L_tQ_L)$ and
    $Q_R\leftarrow\operatorname{qr}(R_tQ_R)$.
  traditional_optimization_link:
    - AdaGrad and matrix preconditioning
    - Shampoo and Kronecker-factored preconditioning
    - Adafactor
    - Adam and RMSProp
    - time-varying orthogonal reparameterization
