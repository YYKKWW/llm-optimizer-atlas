    datasets: 'Not applicable: the claims recorded here are algebraic and theoretical reinterpretations.'
    token_budget: 'Not applicable: no training-token experiment supports the recorded claim.'
    compute_budget: 'Not applicable: no hardware or FLOP benchmark supports the recorded claim.'
    baseline_tuning: 'Not applicable: the equivalences concern explicitly simplified optimizer updates.'
    evaluation_metric: Algebraic equivalence under the assumptions stated by the paper.
    wall_clock_reported: false
    optimizer_state_reported: false
