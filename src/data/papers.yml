    - linear-minimization-oracle
    - norm-constraints
    - scion
  research_tracks:
    - norm-duality
    - benchmarking
  frontier_watch: false
  core_claim: >-
    The paper claims that stochastic conditional-gradient updates over layerwise norm balls unify
    several normalized optimizers and provide a practical Scion family with theoretical guarantees
    and transferable layerwise geometry.
  exact_update: |-
    $d_k=\alpha_k\nabla f(x_k,\xi_k)+(1-\alpha_k)d_{k-1}$ and
    $\operatorname{lmo}_{\mathcal D}(s)\in\arg\min_{x\in\mathcal D}\langle s,x\rangle$.
    Unconstrained SCG uses $x_{k+1}=x_k+\gamma_k\operatorname{lmo}_{\mathcal D}(d_k)$;
    constrained SCG uses $x_{k+1}=(1-\gamma_k)x_k+\gamma_k\operatorname{lmo}_{\mathcal D}(d_k)$.
    Scion applies the corresponding LMO layerwise on operator-norm balls with radii $\rho_\ell$.
  traditional_optimization_link:
    - stochastic conditional gradient
    - Frank-Wolfe methods
    - norm-ball linear minimization oracles
    - normalized steepest descent
    - operator-norm duality
  evidence:
    model_scales: >-
      MLPs and CNNs, DeiT-base, and nanoGPT models from 64M to 1B in the main width sweep; the paper
      also reports experiments up to 3B.
    datasets: FineWeb, ImageNet-1k, CIFAR-10, and Shakespeare.
    token_budget: The main FineWeb setting uses 5100 iterations, batch 512, and block length 1024.
    compute_budget: >-
      A matched total-FLOP budget is not reported; some experiments include measured wall-clock
      behavior.
    baseline_tuning: >-
      Learning rate and model width are swept; comparisons include AdamW and Muon with
      optimizer-specific warmup, clipping, and parameter-group handling.
    evaluation_metric: Language-model validation loss, classification accuracy, and selected wall-clock measurements.
    wall_clock_reported: true
    optimizer_state_reported: true
  limitations:
    - >-
      The convergence guarantees assume a norm-Lipschitz gradient, a lower-bounded objective, an
      unbiased bounded-variance stochastic-gradient oracle, and theorem-specific step-size and
      momentum schedules; the width-transfer derivation uses the simplified setting $\alpha=1$.
    - >-
      Several comparisons also change initialization, activation, or parameter-group rules, so
      optimizer-only causality is not isolated.
    - Muon uses Adam on selected first and last layers while Scion can span the network.
    - >-
      The recommended layerwise norm configuration depends on the model domain and is not one
      universal update.
