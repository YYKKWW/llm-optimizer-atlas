  status: accepted
  venue: 43rd International Conference on Machine Learning (ICML 2026), final paper designated PMLR 306
  paper_url: https://openreview.net/pdf/b9ca84cc3b708b5d87723f4b63527fb35f937506.pdf
  code_url: https://github.com/Unakar/Spectral-Sphere-Optimizer
  source_version: ICML 2026 final paper, designated PMLR 306; arXiv:2601.08393v3
  tags:
    - manifold-optimization
    - matrix-sign
    - mup
    - spectral-sphere
  research_tracks:
    - norm-duality
    - manifold-constraints
    - systems
  frontier_watch: false
  core_claim: >-
    The paper claims that Spectral Sphere Optimizer constrains both module weights and updates in
    spectral geometry, yielding maximal-update-aligned activation control and favorable stability
    and convergence behavior in its tested dense, mixture-of-experts, and deep-network pretraining
    regimes.
  exact_update: >-
    Set $R=\sqrt{d_{\mathrm{out}}/d_{\mathrm{in}}}$,

    $G_t=\nabla_WL(W_t)$, $M_t=\beta M_{t-1}+(1-\beta)G_t$, and $\widehat M_t=M_t/\|M_t\|_F$.

    Power iteration gives $(\sigma_t,u_t,v_t)$ and $\Theta_t=u_tv_t^\top$; retract $W_t\leftarrow
    RW_t/\sigma_t$.

    Find $\lambda_t^*$ such that

    $\langle\Theta_t,\operatorname{msign}(\widehat M_t+\lambda_t^*\Theta_t)\rangle=0$,

    set $\Phi_t=\operatorname{msign}(\widehat M_t+\lambda_t^*\Theta_t)$, and update

    $W_{t+1}=W_t-\eta R\Phi_t$.
  traditional_optimization_link:
    - constrained steepest descent
    - spectral-norm duality
    - matrix-sign linear minimization oracle
    - tangent-space projection and retraction
    - maximal update parameterization
  evidence:
    model_scales: >-
      Dense 1.7B, MoE 8B-A1B, and a 200-layer DeepNet; width-transfer experiments span about
      70M-1.8B.
    datasets: OLMo-Mix-1124, tokenized with the OLMo-2 tokenizer.
    token_budget: >-
      100B training tokens and 1B validation tokens in the main scaling runs; width-transfer runs
      use 30B tokens.
    compute_budget: >-
      BF16 training with about 4M tokens per step; the implementation table measures end-to-end
      latency on NVIDIA B200 hardware.
    baseline_tuning: >-
      The AdamW learning rate is swept on the 1.7B model; Muon and spectral methods share the
      selected schedule, while Spectral Sphere removes hidden-matrix weight decay and tunes solver
      settings.
    evaluation_metric: >-
      Validation loss, downstream accuracy and perplexity, activation and routing stability, and
      per-step latency.
    wall_clock_reported: true
    optimizer_state_reported: true
  limitations:
    - >-
      The spectral sphere is nonsmooth and is not a manifold when the leading singular value is
      repeated.
    - >-
      The current implementation has higher per-step latency than Muon and identifies CPU solver
      synchronization as an unresolved bottleneck.
    - >-
      The principal learning rate is selected for AdamW rather than independently optimized for
      every compared method.
