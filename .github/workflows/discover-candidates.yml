name: Discover literature candidates

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: literature-candidate-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout without write credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate formal datasets and offline discovery tests
        run: |
          npm run validate
          node --test test/candidate-discovery.test.mjs
      - name: Discover unverified candidates
        id: discovery
        continue-on-error: true
        env:
          CROSSREF_MAILTO: ${{ vars.CROSSREF_MAILTO }}
        run: >-
          npm run discover:candidates --
          --output-dir "${{ runner.temp }}/llm-optimizer-discovery"
          --days 180
      - name: Verify formal content remained unchanged
        if: always()
        run: |
          changes="$(git status --porcelain --untracked-files=all -- src/data src/content)"
          if [ -n "$changes" ]; then
            printf '%s\n' "$changes"
            exit 1
          fi
      - name: Upload unverified review bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: literature-candidates-${{ github.run_id }}
          path: ${{ runner.temp }}/llm-optimizer-discovery
          if-no-files-found: error
          retention-days: 30
      - name: Propagate discovery failure after artifact upload
        if: steps.discovery.outcome != 'success'
        run: exit 1
